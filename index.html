<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#230523">
  <title>SpeedCheck AT</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
  <link rel="stylesheet" href="style.css">
  <meta name="description" content="GPS-Geschwindigkeit in Echtzeit — Tempolimit-Vergleich auf österreichischen Straßen. Kostenlos, anonym, ohne App-Download.">
</head>
<body>

<!-- START OVERLAY -->
<div id="start-overlay">
  <div id="start-box">
    <div id="start-eyebrow">GPS · AUDIO · TEMPOLIMIT</div>
    <div id="start-title">SpeedCheck</div>
    <button id="start-btn" onclick="handleStart()">START</button>
    <div id="start-hint">Tippen um GPS und Audio zu aktivieren</div>
  </div>
</div>

<div id="app">
  <!-- HUD — ausgeblendet im Drive Mode -->
  <div id="hud">
    <div class="hud-cell">
      <div class="hud-label">Genauigkeit</div>
      <div class="hud-value" id="accuracy-val">—</div>
      <div class="hud-unit">Meter</div>
    </div>
    <div class="hud-cell">
      <div class="hud-label">Richtung</div>
      <div class="hud-value" id="heading-val">—</div>
      <div class="hud-unit">Grad</div>
    </div>
    <div class="hud-cell">
      <div class="hud-label">Höhe</div>
      <div class="hud-value" id="altitude-val">—</div>
      <div class="hud-unit">Meter</div>
    </div>
  </div>

  <!-- SPEED PANEL -->
  <div id="speed-panel">
    <div id="speed-display">
      <div id="speed-num">0</div>
      <div id="speed-kmh">km/h</div>
    </div>
    <div id="delta-badge">+0 km/h</div>
    <div id="limit-display">
      <div id="limit-sign">
        <div id="limit-num">—</div>
      </div>
      <div id="limit-label">Limit</div>
      <div id="camera-alert">📷 —</div>
    </div>
  </div>

  <!-- STATUS BAR — GPS info only -->
  <div id="status-bar">
    <div id="status-dot"></div>
    <div id="status-text">Warte auf Start…</div>
    <div id="overpass-status"></div>
  </div>

  <!-- CONTROLS BAR — large tap targets for driving -->
  <div id="controls-bar">
    <button id="test-btn"   onclick="testBeep()">TEST</button>
    <button id="sound-btn"  onclick="toggleSound()">♪ PIEP</button>
    <button id="voice-btn"  onclick="toggleVoice()">🔊 AUS</button>
    <button id="radar-btn"  onclick="toggleRadar()">📷 AUS</button>
    <button id="drive-btn"  onclick="toggleDriveMode()">▶ DRIVE</button>
  </div>

  <div id="map"></div>
</div>

<div id="alert-overlay"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet-rotate@0.2.7/dist/leaflet-rotate.js"></script>
<script src="app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
</body>
</html>
